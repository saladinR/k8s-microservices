apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-products
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-products
  template:
    metadata:
      labels:
        app: mongo-products
    spec:
      containers:
      - name: mongo
        image: mongo:6
        ports:
        - containerPort: 27017
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-products
spec:
  selector:
    app: mongo-products
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP