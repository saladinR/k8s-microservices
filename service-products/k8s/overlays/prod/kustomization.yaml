apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
- ../../base

namespace: prod

images:
- name: 192.168.56.10:8082/service-products
  newTag: latest

patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: service-products
    spec:
      replicas: 2
      template:
        spec:
          containers:
          - name: service-products
            resources:
              requests:
                memory: "256Mi"
                cpu: "200m"
              limits:
                memory: "512Mi"
                cpu: "400m"