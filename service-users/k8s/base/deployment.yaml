apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-users
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-users
  template:
    metadata:
      labels:
        app: service-users
    spec:
      imagePullSecrets:
      - name: nexus-secret        # secret pour puller depuis Nexus
      containers:
      - name: service-users
        image: 192.168.56.10:8082/service-users:latest
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: MONGODB_URI
          value: "mongodb://mongo-users:27017/users-db"
        resources:
          requests:               # minimum garanti
            memory: "128Mi"
            cpu: "100m"
          limits:                 # maximum autorisé
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:            # K8s vérifie si l'app est vivante
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:           # K8s vérifie si l'app est prête
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5