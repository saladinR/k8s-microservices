apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
- ../../base

namespace: prod

images:
- name: 192.168.56.10:8082/service-users
  newTag: latest

patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: service-users
    spec:
      replicas: 2        # 2 replicas en prod (haute disponibilité)
      template:
        spec:
          containers:
          - name: service-users
            resources:
              requests:
                memory: "256Mi"    # plus de ressources en prod
                cpu: "200m"
              limits:
                memory: "512Mi"
                cpu: "400m"
